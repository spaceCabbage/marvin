# Marvin Telegram Bot
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.telegram.yml up -d
# Or via Makefile: make bot-up

services:
  marvin-telegram:
    build:
      context: ../telegram-bot
      dockerfile: Dockerfile
    image: marvin-telegram:latest
    container_name: marvin-telegram
    restart: unless-stopped

    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - MARVIN_CONTAINER=marvin-vm
      - WORKSPACE_PATH=/workspace

    volumes:
      # Docker socket for docker exec into marvin-vm
      - /var/run/docker.sock:/var/run/docker.sock:rw

      # Shared workspace for file access (read-only for the bot)
      - ../workspace:/workspace:rw

    # Minimal resources - the bot is lightweight
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m
        reservations:
          cpus: '0.1'
          memory: 64m

    depends_on:
      marvin-vm:
        condition: service_healthy

    networks:
      - marvin-net
