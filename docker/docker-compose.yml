# Marvin: Base Docker Compose Configuration
# This is the base configuration used by all deployment scenarios

services:
  # Main development/pentesting container
  marvin-vm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        INSTALL_METASPLOIT: ${INSTALL_METASPLOIT:-false}
        ENABLE_CHROME: ${ENABLE_CHROME:-true}
      platforms:
        - linux/amd64
        - linux/arm64
    image: marvin:latest
    container_name: marvin-vm
    hostname: marvin
    restart: unless-stopped

    # Environment variables from .env
    environment:
      - HOME=/workspace
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - GEMINI_AUTH_METHOD=${GEMINI_AUTH_METHOD:-oauth}
      - WIFI_INTERFACE=${WIFI_INTERFACE:-wlan1}
      - WIFI_MONITOR_MODE=${WIFI_MONITOR_MODE:-false}
      - TZ=${TZ:-UTC}
      # Playwright browser path (installed to /opt during build)
      - PLAYWRIGHT_BROWSERS_PATH=/opt/playwright
      # Point Playwright cache to preserved location (built-time HOME=/root, runtime HOME=/workspace)
      - XDG_CACHE_HOME=/opt/playwright-cache

    # Volume mounts
    volumes:
      # Workspace is the user's home directory ($HOME=/workspace)
      # Dotfiles, configs, projects, caches all persist here
      - ../workspace:/workspace:rw

      # Docker socket for Docker tools
      - /var/run/docker.sock:/var/run/docker.sock:rw

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEMORY_LIMIT:-4g}
        reservations:
          cpus: '0.5'
          memory: 512m

    # Health check
    healthcheck:
      test: ['CMD', 'gemini', '--version']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Ports for web terminal and services
    # Host Port : Container Port
    ports:
      - "${TTYD_PORT:-4488}:7681"
      - "${FILEBROWSER_PORT:-5599}:8080"

    # Networks
    networks:
      - marvin-net

    # TTY for interactive sessions
    tty: true
    stdin_open: true

    # Shared memory for Playwright browser stability
    shm_size: '2gb'

# Networks
networks:
  marvin-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.name: br-marvin
